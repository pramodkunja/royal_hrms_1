<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy background -->
  <rect width="100" height="100" rx="18" fill="#0c1a2e"/>

  <!-- Circular ring (the "O" concept — HR emblem) -->
  <circle cx="50" cy="46" r="30" fill="none" stroke="#2d6bc9" stroke-width="2.5" opacity="0.85"/>
  <circle cx="50" cy="46" r="28" fill="rgba(45,107,201,0.08)"/>

  <!-- Left person — head + body -->
  <circle cx="27" cy="40" r="6" fill="#1e4e8c" opacity="0.9"/>
  <path d="M19 62 Q19 53 27 53 Q35 53 35 62" fill="#1e4e8c" opacity="0.9"/>

  <!-- Right person — head + body -->
  <circle cx="73" cy="40" r="6" fill="#1e4e8c" opacity="0.9"/>
  <path d="M65 62 Q65 53 73 53 Q81 53 81 62" fill="#1e4e8c" opacity="0.9"/>

  <!-- Center person — head + body (larger, foreground) -->
  <circle cx="50" cy="35" r="9" fill="#5b86c9"/>
  <path d="M36 64 Q36 53 50 53 Q64 53 64 64" fill="#5b86c9"/>

  <!-- Gold tie — corporate accent -->
  <polygon points="50,43 48,55 50,59 52,55" fill="#c99a2e"/>

  <!-- Bottom gold bar — brand underline -->
  <rect x="30" y="76" width="40" height="2.5" rx="1.25" fill="#c99a2e" opacity="0.8"/>
</svg>
